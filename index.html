<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SupaFinance</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #fafafa; }
        #app { width: 400px; margin-top: 50px; }
        .form-grupo { display: flex; flex-direction: column; margin-bottom: 10px; }
        .lista-itens { margin-top: 20px; }
        .item { display: flex; justify-content: space-between; padding: 5px 0; }
        .receita { color: #2ecc71; }
        .despesa { color: #e74c3c; }
    </style>
</head>
<body>
    <div id="app">
        <h2>SupaFinance</h2>
        <div class="form-grupo">
            <input type="text" id="desc" placeholder="Descrição">
            <input type="number" id="valor" placeholder="Valor">
            <select id="tipo">
                <option value="receita">Receita</option>
                <option value="despesa">Despesa</option>
            </select>
            <button onclick="salvar()">Salvar</button>
        </div>
        <div id="lista" class="lista-itens"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
